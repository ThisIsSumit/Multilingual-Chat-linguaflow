name: linguaflow
description: Real-time multilingual chat application
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  dio: ^5.3.2
  socket_io_client: ^3.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  cached_network_image: ^3.3.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/langapp_zoom.png"
  image_path_android: "assets/langapp_zoom.png"
  adaptive_icon_foreground: "assets/langapp_zoom.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground_inset: 0
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - .env
